url: https://ropenspain.github.io/climaemet/

template:
  bootstrap: 5
  package: rostemplate
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@mpizarrozgz"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

reference:
- title: Data access
  desc: Retrieve observations, locations, alerts and climatology data.

- subtitle: Observations and locations
  desc: Work with weather stations, beaches, alerts and recent observations.
- contents:
  - has_concept("observations")

- subtitle: Climatology
  desc: Retrieve daily, monthly, normal and extreme climatology values.
- contents:
  - has_concept("climatology")

- title: Forecasts
  desc: Retrieve and process municipality, beach and wildfire forecasts.
- contents:
  - has_concept("forecasts")


- title: API access
  desc: Configure authentication and query arbitrary AEMET API endpoints.

- subtitle: Authentication
- contents:
  - has_concept("aemet_auth")

- subtitle: Low-level requests
- contents:
  - has_concept("aemet_low")

- title: Visualize data
  desc: Create climatograms, warming stripes and wind roses.

- subtitle: Climatograms
- contents:
  - has_concept("climatogram")

- subtitle: Warming stripes
- contents:
  - has_concept("stripes")


- subtitle: Wind roses
- contents:
  - has_concept("wind")

- title: Helpers
  desc: Convert coordinates, work with calendar years and view package news.
- contents:
  - has_concept("helpers")


- title: Datasets
  desc: Use example datasets included in the package.
- contents:
  - has_concept("dataset")

- title: Package
- contents:
  - climaemet-package

articles:
- title: Get started
  desc: Install and configure climaemet, then retrieve your first data.
  contents:
  - climaemet

- title: API workflows
  desc: Explore AEMET API endpoints, metadata and station locations.
  navbar: API workflows
  contents:
  - extending-climaemet
  - articles/aemet_stations
  - articles/api_metadata

- title: Spatial analysis
  desc: Analyze, interpolate and visualize spatial climate data.
  navbar: Spatial analysis
  contents:
  - articles/interpolation
  - articles/dealing_spatial

authors:
  Manuel Pizarro:
    href: "https://github.com/mpizarrotig"
  Diego Hernangómez:
    href: "https://dieghernan.github.io/"
  Gema Fernández-Avilés:
    href: "https://blog.uclm.es/gemafaviles/"
  AEMET:
    href: "https://www.aemet.es/"
