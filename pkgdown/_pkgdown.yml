url: https://ropenspain.github.io/climaemet/

template:
  bootstrap: 5
  package: rostemplate
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@mpizarrozgz"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

reference:
- title: Get data
  desc: Query AEMET API endpoints.
  contents:
  - has_concept("aemet_api_data")

- title: Forecasts
  desc: Retrieve forecast data.
  contents:
  - has_concept("forecasts")

- title: Authentication
  desc: Manage AEMET API keys.
  contents:
  - has_concept("aemet_auth")

- title: Plot data
  desc: Create climate-related plots.
  contents:
  - has_concept("aemet_plots")

- title: Helpers
  desc: Internal utility and API helper functions.
  contents:
  - has_concept("helpers")
  - has_concept("aemet_api")

- title: Datasets
  desc: Example datasets included in the package.
  contents:
  - has_concept("dataset")

- title: About the package
  contents:
  - climaemet-package

articles:
- title: Articles
  navbar: null
  contents:
  - extending-climaemet
  - articles/aemet_stations
  - articles/api_metadata
  - articles/interpolation
  - articles/dealing_spatial

navbar:
  components:
    articles:
      text: Articles
      menu:
      - text: Extending climaemet
        href: articles/extending-climaemet.html
      - text: AEMET stations
        href: articles/aemet_stations.html
      - text: API metadata
        href: articles/api_metadata.html
      - text: "-------"
      - text: Forecasts
      - text: Spatial interpolation with climaemet
        href: articles/interpolation.html
      - text: Dealing with spatial data
        href: articles/dealing_spatial.html

authors:
  Manuel Pizarro:
    href: "https://github.com/mpizarrotig"
  Diego Hernangómez:
    href: "https://dieghernan.github.io/"
  Gema Fernández-Avilés:
    href: "https://blog.uclm.es/gemafaviles/"
  AEMET:
    href: "https://www.aemet.es/"
