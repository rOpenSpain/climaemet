url: https://ropenspain.github.io/climaemet/

template:
  bootstrap: 5
  package: rostemplate
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@mpizarrozgz"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

reference:
- title: Data access
  desc: Retrieve observations, locations, alerts and climatology data.

- subtitle: Observations and locations
  desc: Work with weather stations, beaches, alerts and latest observations.
- contents:
  - has_concept("observations")
  - has_concept("locations")

- subtitle: Climatology
  desc: Retrieve daily, monthly and extreme climatology values and climatological normals.
- contents:
  - has_concept("climatology")

- title: Forecasts
  desc: Retrieve and process municipality, beach and wildfire forecasts.
- contents:
  - has_concept("forecasts")

- title: API access
  desc: Configure authentication and query arbitrary AEMET API endpoints.

- subtitle: Authentication
  desc: Install, detect and inspect AEMET API keys.
- contents:
  - has_concept("aemet_auth")

- subtitle: Low-level requests
  desc: Retrieve data and metadata from arbitrary API endpoints.
- contents:
  - has_concept("aemet_low")

- title: Visualize data
  desc: Create Walter-Lieth climate diagrams, warming stripes and wind roses.

- subtitle: Walter-Lieth climate diagrams
  desc: Plot Walter-Lieth climate diagrams.
- contents:
  - has_concept("climatogram")

- subtitle: Warming stripes
  desc: Visualize long-term temperature change.
- contents:
  - has_concept("stripes")

- subtitle: Wind roses
  desc: Visualize wind speed and direction.
- contents:
  - has_concept("wind")

- title: Helpers
  desc: Convert coordinates, work with calendar years and view package news.
- contents:
  - has_concept("helpers")

- title: Datasets
  desc: Explore the example datasets included with **climaemet**.
- contents:
  - has_concept("datasets")

- title: Package
  desc: Package-level documentation.
- contents:
  - climaemet-package

articles:
- title: Get started
  desc: Install and configure **climaemet**, then retrieve data from the AEMET API.
  contents:
  - climaemet

- title: API workflows
  desc: Explore AEMET API endpoints, metadata and weather-station locations.
  navbar: API workflows
  contents:
  - extending-climaemet
  - articles/aemet_stations
  - articles/api_metadata

- title: Spatial analysis
  desc: Analyze, interpolate and visualize spatial climatology data.
  navbar: Spatial analysis
  contents:
  - articles/interpolation
  - articles/dealing_spatial

authors:
  Manuel Pizarro:
    href: "https://github.com/mpizarrotig"
  Diego Hernangómez:
    href: "https://dieghernan.github.io/"
  Gema Fernández-Avilés:
    href: "https://blog.uclm.es/gemafaviles/"
  AEMET:
    href: "https://www.aemet.es/"
