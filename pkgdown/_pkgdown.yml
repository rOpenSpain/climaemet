url: https://ropenspain.github.io/climaemet/

template:
  bootstrap: 5
  package: rostemplate
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@mpizarrozgz"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

reference:
- title: Data access
  desc: Retrieve observations, locations, alerts and climatology data.

- subtitle: Observations and locations
  desc: Work with weather stations, beaches, alerts and recent observations.
- contents:
  - aemet_stations
  - aemet_last_obs
  - aemet_beaches
  - aemet_alert_zones
  - aemet_alerts

- subtitle: Climatology
  desc: Retrieve daily, monthly, normal and extreme climatology values.
- contents:
  - aemet_daily
  - aemet_monthly
  - aemet_normal
  - aemet_extremes_clim

- title: Forecasts
  desc: Retrieve and process municipality, beach and wildfire forecasts.
- contents:
  - aemet_forecast_daily
  - aemet_forecast_beaches
  - aemet_forecast_fires
  - aemet_forecast_tidy

- title: API access
  desc: Configure authentication and query arbitrary AEMET API endpoints.

- subtitle: Authentication
- contents:
  - aemet_api_key
  - aemet_detect_api_key

- subtitle: Low-level requests
- contents:
  - get_data_aemet

- title: Visualize data
  desc: Create climatograms, warming stripes and wind roses.

- subtitle: Climatograms
- contents:
  - climatogram_normal
  - climatogram_period
  - ggclimat_walter_lieth

- subtitle: Warming stripes
- contents:
  - climatestripes_station
  - ggstripes

- subtitle: Wind roses
- contents:
  - windrose_days
  - windrose_period
  - ggwindrose

- title: Helpers
  desc: Convert coordinates, work with calendar years and view package news.
- contents:
  - dms2decdegrees
  - first_day_of_year
  - climaemet_news

- title: Datasets
  desc: Use example datasets included in the package.
- contents:
  - has_concept("dataset")

- title: Package
- contents:
  - climaemet-package

