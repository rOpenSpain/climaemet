url: https://ropenspain.github.io/climaemet/

template:
  bootstrap: 5
  package: rostemplate
  opengraph:
    twitter:
      site: "@rOpenSpain"
      creator: "@mpizarrozgz"
      card: summary_large_image

figures:
  dpi: 300
  fig.retina: 2

reference:
- title: Get data
  desc: Retrieve observations, climatology values, alerts and station data.
- contents:
  - has_concept("aemet_api_data")

- title: Forecasts
  desc: Retrieve daily, hourly, beach and wildfire forecasts.
- contents:
  - has_concept("forecasts")

- title: Authentication
  desc: Manage AEMET API keys.
- contents:
  - has_concept("aemet_auth")

- title: Plot data
  desc: Create climate visualizations and diagnostic plots.
- contents:
  - has_concept("aemet_plots")

- title: Helpers
  desc: Work with API clients and helper utilities.
- contents:
  - has_concept("helpers")
  - has_concept("aemet_api")

- title: Datasets
  desc: Use example datasets included in the package.
- contents:
  - has_concept("dataset")

- title: About the package
- contents:
  - climaemet-package

articles:
- title: Get started
  desc: Learn the fundamentals of climaemet.
  contents:
  - climaemet

- title: API and data
  desc: Work with AEMET API endpoints, metadata and stations.
  navbar: API and data
  contents:
  - extending-climaemet
  - articles/aemet_stations
  - articles/api_metadata

- title: Spatial workflows
  desc: Analyze, interpolate and visualize spatial climate data.
  navbar: Spatial workflows
  contents:
  - articles/interpolation
  - articles/dealing_spatial

authors:
  Manuel Pizarro:
    href: "https://github.com/mpizarrotig"
  Diego Hernangómez:
    href: "https://dieghernan.github.io/"
  Gema Fernández-Avilés:
    href: "https://blog.uclm.es/gemafaviles/"
  AEMET:
    href: "https://www.aemet.es/"
